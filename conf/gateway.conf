# gateway.conf - AIoT 边缘网关配置
# 注释以 # 开头，空行忽略

# TCP 服务器配置
[tcp]
port = 9000
max_connections = 1024

# UDS (Unix Domain Socket) 配置
[uds]
data_path = /tmp/gateway_data.sock
engine_path = /tmp/gateway_engine.sock
monitor_path = /tmp/gateway_monitor.sock

# SQLite 数据库配置
[sqlite]
db_path = /tmp/gateway_data.db

# [mqtt]
# broker = 192.168.1.100
# port = 1883
# client_id = gateway/gw001

# [modbus]
# port = /dev/ttymxc1
# baudrate = 9600
# poll_interval_ms = 2000

# HTTP 监控仪表盘（浏览器访问 http://IP:port）
[http]
port = 8080
